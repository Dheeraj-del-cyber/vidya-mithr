<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vidya Mitra - History</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg,#d5cdcd,#4f1414);
    color: #fbf3f3;
    display: flex;
    justify-content: center;
    padding: 40px 0;
}
.container {
    width: 90%;
    max-width: 900px;
}
h1 {
    text-align: center;
    color: #290202;
    margin-bottom: 20px;
}
.card {
    background: #e2bcbc;
    color: #17191b;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    position: relative;
}
.card h3 { margin-bottom: 8px; color: #203a43; }
.card p { line-height: 1.5; }
button {
    padding: 6px 12px;
    font-size: 13px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    position: absolute;
    top: 15px;
    right: 15px;
    transition: all 0.3s ease;
}
.delete-btn { background: #cdaca9; color: rgb(18, 16, 16); }
.delete-btn:hover { background: #e74c3c; }
.clear-btn { background: #0a0f13; color: rgb(240, 235, 235); margin: 20px auto; display: block; }
.clear-btn:hover { background: #1f2529; }
.back-btn {
    display: inline-block;
    margin-bottom: 15px;
    padding: 8px 16px;
    background: #0a0f13;
    color: #f0ebeb;
    text-decoration: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.3s ease;
}

.back-btn:hover {
    background: #1f2529;
    transform: translateY(-1px);
}
</style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Back</a>
    <h1>Question & Answer History</h1>
    <div id="history"></div>
    <button class="clear-btn" onclick="clearAll()">Clear All History</button>
</div>

<script>
function loadHistory() {
    const historyDiv = document.getElementById('history');
    historyDiv.innerHTML = '';
    const history = JSON.parse(localStorage.getItem('vidyaHistory') || '[]');

    if(history.length === 0){
        historyDiv.innerHTML = "<p style='text-align:center;color:#555;'>No history available.</p>";
        return;
    }

    history.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <h3>Q: ${item.question}</h3>
            <p>A: ${item.answer}</p>
            <button class="delete-btn" onclick="deleteEntry(${index})">Delete</button>
        `;
        historyDiv.appendChild(card);
    });
}

function deleteEntry(index){
    let history = JSON.parse(localStorage.getItem('vidyaHistory') || '[]');
    history.splice(index, 1);
    localStorage.setItem('vidyaHistory', JSON.stringify(history));
    loadHistory();
}

function clearAll(){
    localStorage.removeItem('vidyaHistory');
    loadHistory();
}

loadHistory();
</script>

</body>
</html>
